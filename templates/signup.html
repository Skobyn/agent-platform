<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Agent Platform</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <nav class="navbar">
        <a href="/" class="navbar-brand">
            <div class="logo">⚡</div>
            Agent Platform
        </a>
    </nav>

    <div class="auth-container">
        <div class="auth-card">
            <h2>Create Your Account</h2>
            <p class="subtitle">Start deploying AI agents in minutes</p>
            
            <div class="auth-error" id="error-msg"></div>
            
            <form id="signup-form" onsubmit="handleSignup(event)">
                <div class="input-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" placeholder="Jane Smith" required>
                </div>
                <div class="input-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="you@company.com" required>
                </div>
                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Min 8 characters" required minlength="8">
                </div>
                <button type="submit" class="btn btn-primary" id="signup-btn">Create Account</button>
            </form>
            
            <p class="footer-link">
                Already have an account? <a href="/login">Log in</a>
            </p>
        </div>
    </div>

    <script>
        async function handleSignup(e) {
            e.preventDefault();
            const btn = document.getElementById('signup-btn');
            const errEl = document.getElementById('error-msg');
            errEl.style.display = 'none';
            btn.textContent = 'Creating account...';
            btn.disabled = true;

            try {
                const res = await fetch('/api/auth/signup', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        name: document.getElementById('name').value,
                        email: document.getElementById('email').value,
                        password: document.getElementById('password').value
                    })
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.detail || 'Signup failed');
                
                localStorage.setItem('token', data.access_token);
                localStorage.setItem('user_id', data.user_id);
                window.location.href = '/dashboard';
            } catch (err) {
                errEl.textContent = err.message;
                errEl.style.display = 'block';
                btn.textContent = 'Create Account';
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
