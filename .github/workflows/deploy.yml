name: Deploy to Cloud Run

on:
  push:
    branches: [main]

env:
  PROJECT_ID: apex-internal-apps
  REGION: us-central1
  SERVICE: agent-platform

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Build and Push to Artifact Registry
        run: |
          docker build -t us-central1-docker.pkg.dev/${{ env.PROJECT_ID }}/workflow-assistant/${{ env.SERVICE }}:${{ github.sha }} .
          docker build -t us-central1-docker.pkg.dev/${{ env.PROJECT_ID }}/workflow-assistant/${{ env.SERVICE }}:latest .
          docker push us-central1-docker.pkg.dev/${{ env.PROJECT_ID }}/workflow-assistant/${{ env.SERVICE }}:${{ github.sha }}
          docker push us-central1-docker.pkg.dev/${{ env.PROJECT_ID }}/workflow-assistant/${{ env.SERVICE }}:latest

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE }} \
            --image us-central1-docker.pkg.dev/${{ env.PROJECT_ID }}/workflow-assistant/${{ env.SERVICE }}:${{ github.sha }} \
            --region ${{ env.REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --service-account adlan-deployer@apex-internal-apps.iam.gserviceaccount.com \
            --memory 512Mi \
            --cpu 1 \
            --min-instances 0 \
            --max-instances 10 \
            --set-env-vars "GCP_PROJECT=apex-internal-apps,ADMIN_EMAIL=admin@agentplatform.ai,ADMIN_PASSWORD=AgentPlatform2026!" \
            --quiet
